<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Trendout</title>
    <script type="text/javascript">
      // Redireciona qualquer rota desconhecida (ex: /produto/x) de volta para o index.html,
      // codificada na query string, para o react-router a decifrar e navegar corretamente.
      // pathSegmentsToKeep = 1 enquanto serves em <user>.github.io/trendout-loja/
      // (mantém o segmento "trendout-loja" do caminho). Muda para 0 quando
      // ligares um domínio próprio (ex: loja.trendout.pt) na raiz.
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + "//" + l.hostname + (l.port ? ":" + l.port : "") +
        l.pathname.split("/").slice(0, 1 + pathSegmentsToKeep).join("/") + "/?/" +
        l.pathname.slice(1).split("/").slice(pathSegmentsToKeep).join("/").replace(/&/g, "~and~") +
        (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>

<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Trendout</title>
    <script type="text/javascript">
      // Redireciona qualquer rota desconhecida (ex: /produto/x) de volta para o index.html,
      // codificada na query string, para o react-router a decifrar e navegar corretamente.
      // pathSegmentsToKeep = 0 quando serves a partir da raiz de um domínio próprio
      // (ex: loja.trendout.pt). Se estiveres a testar em <user>.github.io/trendout-loja/
      // sem domínio próprio ainda, muda para 1.
      var pathSegmentsToKeep = 0;
      var l = window.location;
      l.replace(
        l.protocol + "//" + l.hostname + (l.port ? ":" + l.port : "") +
        l.pathname.split("/").slice(0, 1 + pathSegmentsToKeep).join("/") + "/?/" +
        l.pathname.slice(1).split("/").slice(pathSegmentsToKeep).join("/").replace(/&/g, "~and~") +
        (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>

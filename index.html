    <style>
      :root {
        --color-bg: #0f1210;
        --color-bg-raised: #171b18;
        --color-bg-raised-2: #1c211d;
        --color-border: #262b26;
        --color-text: #eef0ec;
        --color-muted: #8a9089;
        --color-accent: #c9ff3f;
        --font-heading: 'Bebas Neue', sans-serif;
        --font-body: 'Inter', sans-serif;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; background: var(--color-bg); height: 100%; }
      html { overscroll-behavior: none; }
      body { -webkit-text-size-adjust: 100%; overflow-x: hidden; min-height: 100%; overscroll-behavior-y: none; }
      #root { overflow-x: hidden; min-height: 100vh; background: var(--color-bg); }
    </style>
    <script type="text/javascript">
      // Complemento do truque em public/404.html — descodifica a rota original
      // e recoloca-a no URL antes do react-router arrancar.
      (function (l) {
        if (l.search[1] === "/") {
          var decoded = l.search.slice(1).split("&").map(function (s) {
            return s.replace(/~and~/g, "&");
          }).join("?");
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>

    <div id="root"></div>
